databases:
  - name: dhms-postgres
    plan: free
    databaseName: dhms_db
    user: dhms_user

services:
  - type: web
    name: dhms-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      pip install gunicorn psycopg2-binary dj-database-url
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dhms-postgres
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dhms-frontend.onrender.com"
      - key: TELEGRAM_BOT_TOKEN
        value: ${TELEGRAM_BOT_TOKEN}
      - key: TELEGRAM_CHAT_ID
        value: ${TELEGRAM_CHAT_ID}
      - key: OPENROUTER_API_KEY
        value: ${OPENROUTER_API_KEY}
      - key: OPENROUTER_MODEL
        value: "meta-llama/llama-3.1-8b-instruct:free"
      # Note: Celery/Redis are excluded in the free tier footprint.
      # The backend handles this gracefully via the try/except block in signals.py


